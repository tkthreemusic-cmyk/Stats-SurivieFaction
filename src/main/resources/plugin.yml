name: PlayerStats
version: '1.6.0'
main: com.playerstats.PlayerStats
api-version: '1.21'
author: PlayerStats
description: Plugin de statistiques des joueurs avec classements dans le chat
commands:
  stats:
    description: Commande principale pour PlayerStats
    usage: /<command> [help|kills|playerkills|deaths|progress|reload|reset] [player]
    aliases: [stat, classements]
permissions:
  playerstats.use:
    description: Permet d'utiliser les commandes de base
    default: true
  playerstats.admin:
    description: Permet les commandes admin (reload, reset)
    default: op