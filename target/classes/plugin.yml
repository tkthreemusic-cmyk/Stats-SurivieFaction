name: PlayerStats
version: '1.0.0'
main: com.playerstats.PlayerStats
api-version: '1.21'
author: PlayerStats
description: Track and display player statistics including kills, deaths, and progress
commands:
  playerstats:
    description: Main command for PlayerStats plugin
    usage: /<command> [help|kills|deaths|progress|reload] [player]
    aliases: [pstats, pst]
  playerstats-admin:
    description: Admin command for PlayerStats plugin
    usage: /<command> [reset|set] <player> <stat> <value>
    aliases: [pstatsadmin, psta]
permissions:
  playerstats.use:
    description: Allows basic use of PlayerStats commands
    default: true
  playerstats.admin:
    description: Allows admin commands for PlayerStats
    default: op
  playerstats.seeother:
    description: Allows viewing other players' stats
    default: true